name: aeroftp
version: '3.5.7'
summary: Modern File Transfer & Cloud Client — 25 Protocols, AI Assistant
description: |
  AeroFTP is a modern file transfer client that goes beyond traditional FTP.
  Connect to FTP/FTPS servers, SFTP, WebDAV, S3-compatible storage, and major
  cloud providers — all from a single, elegant interface.

  Supported Protocols (25):
  FTP, FTPS (TLS 1.3), SFTP, WebDAV (Nextcloud, CloudMe, Seafile, DriveHQ),
  4shared, S3-compatible (AWS, Backblaze B2, Wasabi, MinIO), Google Drive,
  Dropbox, OneDrive, MEGA.nz, Filen, Box, pCloud, Azure Blob Storage,
  Zoho WorkDrive, Internxt Drive, kDrive, Koofr, Jottacloud, FileLu,
  Yandex Disk, OpenDrive.

  Data Protection:
  - AeroVault v2 encrypted containers (AES-256-GCM-SIV, Argon2id)
  - Master Password with auto-lock
  - Cryptomator vault support (format 8)
  - OS Keyring integration (libsecret / Keychain / Credential Manager)
  - Zero telemetry — all credentials stored locally

  AeroCloud — Personal Cloud:
  Turn any FTP server into your private cloud with bidirectional sync
  and background service.

  Built-in Developer Suite:
  - Monaco Editor (VS Code engine) for remote file editing
  - Integrated terminal with theme sync
  - AeroAgent AI assistant (19 providers including OpenAI, Anthropic,
    Gemini, Ollama, and more)

  AeroSync — Reliable Synchronization:
  - Bidirectional sync with journal checkpoint and resume
  - Checksum verification and post-transfer validation
  - Configurable retry with exponential backoff

  More Features:
  - 4 app themes (Light, Dark, Tokyo Night, Cyber) with 3 icon styles
  - Archive browser (ZIP, 7z, TAR, RAR) with selective extraction
  - AeroPlayer media player with 14 visualizers and 10-band EQ
  - Dual-pane browser with drag-and-drop and batch rename
  - Also includes a terminal-based client for advanced workflows
  - 47 languages supported

  Note: Snap version can access ~/home and removable media. For system-wide
  access, use .deb or .AppImage from GitHub releases.

  https://github.com/axpdev-lab/aeroftp/releases

  Built with Rust (Tauri 2) + React 18. GPL-3.0 license.

base: core22
grade: stable
confinement: strict
compression: lzo

contact: https://github.com/axpdev-lab/aeroftp/discussions
issues: https://github.com/axpdev-lab/aeroftp/issues
source-code: https://github.com/axpdev-lab/aeroftp
website: https://aeroftp.app
license: GPL-3.0

architectures:
  - build-on: amd64
    build-for: amd64

icon: icons/AeroFTP_simbol_color_512x512.png

apps:
  aeroftp:
    command: usr/bin/aeroftp
    desktop: usr/share/applications/aeroftp.desktop
    environment:
      # WebKitGTK environment
      GDK_BACKEND: x11
      GTK_USE_PORTAL: 1
    plugs:
      - home
      - removable-media
      - network
      - network-bind
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - opengl
      - audio-playback
      - unity7
      - gsettings

plugs:
  gtk-3-themes:
    interface: content
    target: $SNAP/data-dir/themes
    default-provider: gtk-common-themes
  icon-themes:
    interface: content
    target: $SNAP/data-dir/icons
    default-provider: gtk-common-themes
  sound-themes:
    interface: content
    target: $SNAP/data-dir/sounds
    default-provider: gtk-common-themes

layout:
  /usr/lib/x86_64-linux-gnu/webkit2gtk-4.1:
    symlink: $SNAP/usr/lib/x86_64-linux-gnu/webkit2gtk-4.1
  /usr/share/xml/iso-codes:
    symlink: $SNAP/usr/share/xml/iso-codes

parts:
  aeroftp:
    plugin: nil
    source: .
    stage-packages:
      - libwebkit2gtk-4.1-0
      - libgtk-3-0
      - libayatana-appindicator3-1
      - librsvg2-2
      - libssl3
      - libasound2
      - libgstreamer1.0-0
      - gstreamer1.0-plugins-base
      - gstreamer1.0-plugins-good
      - iso-codes
      - libglu1-mesa
    override-build: |
      # Copy pre-built binary
      mkdir -p $SNAPCRAFT_PART_INSTALL/usr/bin
      mkdir -p $SNAPCRAFT_PART_INSTALL/usr/share/icons/hicolor/256x256/apps
      mkdir -p $SNAPCRAFT_PART_INSTALL/usr/share/applications
      
      if [ -f src-tauri/target/release/aeroftp ]; then
        cp src-tauri/target/release/aeroftp $SNAPCRAFT_PART_INSTALL/usr/bin/
        chmod +x $SNAPCRAFT_PART_INSTALL/usr/bin/aeroftp
        echo "Binary copied successfully"
      else
        echo "ERROR: Binary not found at src-tauri/target/release/aeroftp"
        ls -la src-tauri/target/release/ || echo "Release directory not found"
        exit 1
      fi
      
      # Copy icon
      cp icons/AeroFTP_simbol_color_512x512.png $SNAPCRAFT_PART_INSTALL/usr/share/icons/hicolor/256x256/apps/aeroftp.png
      
      # Create desktop entry
      cat > $SNAPCRAFT_PART_INSTALL/usr/share/applications/aeroftp.desktop << 'DESKTOP'
      [Desktop Entry]
      Name=AeroFTP
      Comment=Multi-Protocol File Client with AI & Encryption (Snap - Limited FS)
      Exec=aeroftp %f
      Icon=${SNAP}/usr/share/icons/hicolor/256x256/apps/aeroftp.png
      Terminal=false
      Type=Application
      Categories=Network;FileTransfer;Development;
      Keywords=ftp;sftp;file;transfer;upload;download;
      MimeType=x-scheme-handler/ftp;x-scheme-handler/ftps;x-scheme-handler/sftp;application/x-aerovault;
      StartupWMClass=AeroFTP
      DESKTOP
      # Remove leading whitespace from desktop file
      sed -i 's/^      //' $SNAPCRAFT_PART_INSTALL/usr/share/applications/aeroftp.desktop

      # Install AeroVault MIME type definition
      mkdir -p $SNAPCRAFT_PART_INSTALL/usr/share/mime/packages
      cp com.aeroftp.AeroVault.xml $SNAPCRAFT_PART_INSTALL/usr/share/mime/packages/ || \
        { echo "ERROR: MIME XML not found"; exit 1; }

      # Install AeroVault MIME type icons (8 PNG sizes + scalable SVG)
      for size in 16 24 32 48 64 128 256 512; do
        mkdir -p $SNAPCRAFT_PART_INSTALL/usr/share/icons/hicolor/${size}x${size}/mimetypes
        cp src-tauri/icons/mimetypes/application-x-aerovault-${size}.png \
          $SNAPCRAFT_PART_INSTALL/usr/share/icons/hicolor/${size}x${size}/mimetypes/application-x-aerovault.png || \
          { echo "ERROR: Missing icon ${size}px"; exit 1; }
      done
      mkdir -p $SNAPCRAFT_PART_INSTALL/usr/share/icons/hicolor/scalable/mimetypes
      cp src-tauri/icons/mimetypes/application-x-aerovault.svg \
        $SNAPCRAFT_PART_INSTALL/usr/share/icons/hicolor/scalable/mimetypes/application-x-aerovault.svg || \
        { echo "ERROR: Missing SVG icon"; exit 1; }
