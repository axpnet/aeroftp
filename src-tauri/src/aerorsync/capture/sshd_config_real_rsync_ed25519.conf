Port 22
Protocol 2
# Ed25519-only host key so the fingerprint extracted from
# /etc/ssh/ssh_host_ed25519_key.pub matches what libssh2 negotiates on the
# client side. Same rationale as the native lane's sshd_config.
HostKey /etc/ssh/ssh_host_ed25519_key
HostKeyAlgorithms ssh-ed25519
PubkeyAcceptedAlgorithms ssh-ed25519,ssh-rsa
PermitRootLogin no
PasswordAuthentication no
KbdInteractiveAuthentication no
PubkeyAuthentication yes
UsePAM no
X11Forwarding no
AllowUsers testuser
AuthorizedKeysFile .ssh/authorized_keys
Subsystem sftp /usr/lib/openssh/sftp-server
PidFile /var/run/sshd.pid
LogLevel DEBUG3

# Intercept every exec request (`ssh host <cmd>`) with a wrapper that tees
# stdin and stdout to a capture directory before delegating to /bin/bash -c.
# This is what makes this lane the byte-level rsync protocol 31 oracle:
# every frame the real rsync server emits, and every frame the real rsync
# client sends, is persisted under /workspace/real_capture/<timestamp>/.
# $SSH_ORIGINAL_COMMAND holds the command the client would have run.
ForceCommand /opt/rsync-tee/rsync_server_wrapper.sh
