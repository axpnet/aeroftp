# Password-auth-only SFTP + rsync fixture for the silent-fallback product-path
# test. Keeps the key-auth fixture untouched on :2222.

services:
  sftp-rsync-password:
    build:
      context: .
      dockerfile: Dockerfile.password
    container_name: aeroftp-delta-sync-fixture-password
    ports:
      - "127.0.0.1:2223:22"
    volumes:
      - workdir-password:/workdir
    restart: "no"
    healthcheck:
      test: ["CMD", "sh", "-c", "command -v rsync && pgrep sshd"]
      interval: 2s
      timeout: 2s
      retries: 5

volumes:
  workdir-password: