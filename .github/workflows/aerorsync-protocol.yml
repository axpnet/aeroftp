name: Aerorsync Protocol

# Dedicated workflow for the `aerorsync` native rsync wire-protocol module.
# The production `build.yml` workflow stays untouched — this file lives
# next to it and is entirely additive.
#
# Originally created as `strada-c-prototype.yml` while the module was an
# opt-in experiment; renamed in v3.6.3 because `aerorsync` has been
# mainline + default-on since v3.6.1 and is no longer a prototype.
# The `strada-c-*` branch triggers below are kept for back-compat with
# in-flight feature branches; all new work targets `main`.
#
# Triggering policy:
#   * push / PR on `strada-c-**` branches -> full verification matrix
#     (check + clippy + mock + Docker lane 2 + Docker lane 3).
#   * push on `main` -> a single `cargo check --lib` smoke step to catch
#     regressions that would prevent a future rebase of in-flight work.
#
# The lane2 / lane3 Docker jobs need `src-tauri/src/aerorsync/capture/`
# (Docker fixtures, ssh keys, compose files); on `main` that subtree is
# present but the artifact directories underneath are gitignored.

on:
  push:
    branches:
      - main
      - 'strada-c-**'
  pull_request:
    branches:
      - 'strada-c-**'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ------------------------------------------------------------------
  # main-smoke: cheap guard that main has not silently broken the
  # feature-off default build. Runs only on pushes to main.
  # ------------------------------------------------------------------
  main-smoke:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    name: main smoke (feature off)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libssl-dev pkg-config
      - name: cargo check --lib (feature off)
        working-directory: src-tauri
        run: cargo check --lib

  # ------------------------------------------------------------------
  # check: full verification block on strada-c-* branches.
  # Mirrors the local manual verification the handoff doc requires.
  # ------------------------------------------------------------------
  check:
    if: startsWith(github.ref, 'refs/heads/strada-c-') || startsWith(github.head_ref, 'strada-c-')
    name: check + clippy + mock suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libssl-dev pkg-config libzstd-dev
      - name: cargo check --features aerorsync --lib
        working-directory: src-tauri
        run: cargo check --features aerorsync --lib
      - name: cargo check --features aerorsync --bin aerorsync_serve
        working-directory: src-tauri
        run: cargo check --features aerorsync --bin aerorsync_serve
      - name: cargo clippy (strict, -D warnings)
        working-directory: src-tauri
        run: cargo clippy --lib --features aerorsync --all-targets -- -D warnings
      - name: Mock + unit test suite
        working-directory: src-tauri
        run: cargo test --features aerorsync --lib aerorsync
      - name: Default build regression (feature off)
        working-directory: src-tauri
        run: cargo check --lib

  # ------------------------------------------------------------------
  # lane2: Docker-backed lane 2 — our own `aerorsync_serve` binary
  # runs inside a container and the driver speaks the protocol we wrote.
  # Useful for catching drift between the serve side and the driver
  # side of our encoder/decoder pair.
  # ------------------------------------------------------------------
  lane2:
    if: startsWith(github.ref, 'refs/heads/strada-c-') || startsWith(github.head_ref, 'strada-c-')
    name: Docker lane 2 (native aerorsync_serve)
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libssl-dev pkg-config libzstd-dev
      - name: Start native harness
        working-directory: src-tauri/src/aerorsync/capture
        run: |
          chmod 600 keys/id_ed25519
          docker compose -f docker-compose.native.yml up -d --build
      - name: Wait for sshd (native, port 2222)
        run: |
          for i in $(seq 1 30); do
            if nc -z 127.0.0.1 2222; then echo "sshd up"; exit 0; fi
            sleep 1
          done
          echo "::error::native harness failed to open port 2222"
          exit 1
      - name: Run lane 2 live tests
        working-directory: src-tauri
        env:
          RUSTFLAGS: '--cfg ci_lane2'
        run: cargo test --features aerorsync --lib aerorsync::live_tests -- --ignored --nocapture
      - name: Tear down harness
        if: always()
        working-directory: src-tauri/src/aerorsync/capture
        run: docker compose -f docker-compose.native.yml down -v

  # ------------------------------------------------------------------
  # lane3: Docker-backed lane 3 — a real `rsync 3.2.7` server over SSH.
  # The test drives the full upload + finish_session round-trip against
  # a live rsync and surfaces any regression in the native protocol
  # implementation immediately. S8j closed the prior NDX_DONE / xxh128
  # gaps, so this job is now a hard gate on `strada-c-*` branches.
  # ------------------------------------------------------------------
  lane3:
    if: startsWith(github.ref, 'refs/heads/strada-c-') || startsWith(github.head_ref, 'strada-c-')
    name: Docker lane 3 (real rsync 3.2.7)
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libssl-dev pkg-config libzstd-dev netcat-openbsd
      - name: Start real-rsync harness
        working-directory: src-tauri/src/aerorsync/capture
        run: |
          chmod 600 keys/id_ed25519
          docker compose -f docker-compose.real-rsync.yml up -d --build
      - name: Wait for sshd (real rsync, port 2224)
        run: |
          for i in $(seq 1 30); do
            if nc -z 127.0.0.1 2224; then echo "sshd up"; exit 0; fi
            sleep 1
          done
          echo "::error::real-rsync harness failed to open port 2224"
          exit 1
      - name: Run lane 3 live test
        working-directory: src-tauri
        env:
          RUSTFLAGS: '--cfg ci_lane3'
        run: |
          cargo test --features aerorsync --lib \
            aerorsync::native_driver::tests::driver_upload_live_lane_3_real_rsync_byte_identical \
            -- --nocapture
      - name: Tear down harness
        if: always()
        working-directory: src-tauri/src/aerorsync/capture
        run: docker compose -f docker-compose.real-rsync.yml down -v
