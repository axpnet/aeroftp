name: Build AeroFTP

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-release:
    # Required for creating releases and Sigstore keyless signing via GitHub OIDC.
    permissions:
      contents: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: linux
          - platform: windows-latest
            target: windows
          - platform: macos-latest
            target: macos

    runs-on: ${{ matrix.platform }}
    
    steps:
      - name: Free disk space (Linux)
        if: matrix.target == 'linux'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/share/swift
          sudo apt-get clean
          df -h /

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Rust cache
        uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          workspaces: './src-tauri -> target'
          # Cache prefix bumped 2026-05-06 to invalidate any cached
          # whisper-rs-sys CMakeCache.txt referencing Visual Studio 17 2022
          # after the windows-latest runner image rolled to VS 18 2026.
          # See "Drop stale whisper-rs-sys CMake artifacts" below for the
          # belt-and-suspenders runtime cleanup.
          prefix-key: 'v2-whisper-vs18'

      # whisper-rs-sys vendors whisper.cpp and runs CMake at build time. The
      # generator picked by `cmake-rs` is whichever Visual Studio CMake finds
      # on the runner. When GitHub rolls the windows-latest image to a newer
      # VS (e.g. VS 17 2022 -> VS 18 2026 preview), the rust-cache restored
      # CMakeCache.txt still references the previous generator and CMake
      # aborts: "generator does not match the generator used previously".
      # Belt-and-suspenders: even with the prefix-key bump we drop the
      # whole whisper-rs-sys-* tree on Windows to force a clean reconfigure,
      # in case a future cache key collision restores stale artifacts.
      # Removing only `out/` previously left `out/build/CMakeCache.txt`
      # behind on some runners depending on cmake-rs internal layout, so we
      # nuke the entire crate build dir.
      - name: Drop stale whisper-rs-sys CMake artifacts (Windows)
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          $base = "src-tauri/target/release/build"
          if (Test-Path $base) {
            $purged = 0
            Get-ChildItem $base -Directory -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -like 'whisper-rs-sys-*' } |
              ForEach-Object {
                Write-Host "Removing whole whisper-rs-sys build dir: $($_.FullName)"
                Remove-Item -Recurse -Force $_.FullName -ErrorAction SilentlyContinue
                $purged++
              }
            Write-Host "Purged $purged whisper-rs-sys build dir(s)"
          } else {
            Write-Host "No prior build dir, nothing to purge"
          }

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse3-dev
          # Install Snapcraft with retry on transient snap-store outages
          for i in 1 2 3 4 5; do
            if sudo snap install snapcraft --classic; then
              echo "snapcraft installed (attempt $i)"
              break
            fi
            if [ "$i" -eq 5 ]; then
              echo "snapcraft install still failing after 5 attempts; continuing: Snap step is continue-on-error"
              break
            fi
            echo "snap install failed (attempt $i/5), retry in 60s..."
            sleep 60
          done

      - name: Install npm dependencies
        run: npm ci

      - name: Run security regression suite (MVP)
        run: npm run security:regression

      # Quality gates: run on Linux only to avoid duplicating work across platforms
      - name: TypeScript type check
        if: matrix.target == 'linux'
        run: npx tsc --noEmit

      - name: i18n validation
        if: matrix.target == 'linux'
        run: npm run i18n:validate

      - name: Rust linting (clippy)
        if: matrix.target == 'linux'
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Rust tests
        if: matrix.target == 'linux'
        working-directory: src-tauri
        run: cargo test

      - name: Build Tauri app
        run: npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Fix Tauri AppImage for cross-distro compatibility (issue #90).
      #
      # Problem: linuxdeploy bundles shared libraries (WebKitGTK, GStreamer, etc.)
      # compiled on Ubuntu. On Arch/Fedora/rolling distros these bundled libs
      # conflict with system EGL/Mesa/libavif/GStreamer, causing cascading
      # "undefined symbol" errors and "EGL_BAD_PARAMETER" blank screens.
      #
      # Fix: remove ALL bundled shared libraries. The AppImage uses system libs
      # at runtime. Tested on Arch (EndeavourOS) + KDE Wayland + Intel Haswell.
      # The binary's C API linkage is stable across distros: only the bundled
      # libs caused ABI conflicts. The user must have webkit2gtk-4.1 installed
      # (same requirement as the .deb and AUR packages).
      #
      # Also fixes .DirIcon absolute symlink (AppImageHub spec compliance).
      - name: Fix AppImage (unbundle libs + DirIcon)
        if: matrix.target == 'linux'
        run: |
          APPIMAGE=$(realpath src-tauri/target/release/bundle/appimage/*.AppImage 2>/dev/null | head -1)
          if [ -z "$APPIMAGE" ]; then echo "No AppImage found, skipping"; exit 0; fi
          echo "Patching $APPIMAGE"
          chmod +x "$APPIMAGE"
          ORIG_SIZE=$(du -m "$APPIMAGE" | cut -f1)

          # Extract squashfs
          OFFSET=$("$APPIMAGE" --appimage-offset)
          mkdir -p /tmp/appimage-fix
          unsquashfs -d /tmp/appimage-fix/squashfs-root -o "$OFFSET" "$APPIMAGE"

          cd /tmp/appimage-fix/squashfs-root

          # --- Fix 1: .DirIcon absolute symlink ---
          rm -f .DirIcon
          ICON=$(ls *.png 2>/dev/null | head -1)
          if [ -n "$ICON" ]; then
            ln -s "$ICON" .DirIcon
            echo "Fixed: .DirIcon -> $ICON (relative)"
          fi

          # --- Fix 2: Remove all bundled shared libraries (issue #90) ---
          # Keeps: binary, icons, desktop file, AppRun, metadata.
          # Removes: usr/lib/*.so* (WebKitGTK, GStreamer, GLib, etc.)
          LIB_COUNT=$(find usr/lib -name '*.so*' -type f -o -name '*.so*' -type l 2>/dev/null | wc -l)
          rm -f usr/lib/lib*.so*
          echo "Removed $LIB_COUNT bundled shared libraries"

          # --- Re-package using appimagetool ---
          cd /tmp/appimage-fix
          APPIMAGETOOL_URL="https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          APPIMAGETOOL_SHA256="a6d71e2b6cd66f8e8d16c37ad164658985e0cf5fcaa950c90a482890cb9d13e0"
          wget -q "$APPIMAGETOOL_URL" -O appimagetool
          echo "${APPIMAGETOOL_SHA256}  appimagetool" | sha256sum -c - || {
            echo "::error::appimagetool checksum mismatch: possible supply chain compromise. Update APPIMAGETOOL_SHA256 in build.yml after verification."
            echo "Actual checksum: $(sha256sum appimagetool | cut -d' ' -f1)"
            exit 1
          }
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run squashfs-root "$APPIMAGE"
          NEW_SIZE=$(du -m "$APPIMAGE" | cut -f1)
          echo "AppImage re-packaged: ${ORIG_SIZE}MB -> ${NEW_SIZE}MB (system libs only)"

      # Build Snap package using Snapcraft (Tauri doesn't generate .snap)
      # NOTE 2026-04-28: snapcore/action-build@3bdaa03e is currently dying
      # silently during LXD setup on ubuntu-22.04 runners (3 reruns of v3.6.9
      # all silent-OOM at the same point). Marked continue-on-error so the
      # rest of the Linux release pipeline (deb/rpm/AppImage signing and
      # upload) does not get blocked. The Snap Store stays on the previous
      # release until we either pin a newer action ref or move the Snap
      # build to its own job. Tracked for v3.7.0 cleanup.
      - name: Build Snap package
        if: startsWith(github.ref, 'refs/tags/') && matrix.target == 'linux'
        uses: snapcore/action-build@3bdaa03e1ba6bf59a65f84a751d943d549a54e79 # v1
        id: snap-build
        continue-on-error: true

      # Create portable ZIP for Windows (no installer needed)
      - name: Create Windows portable ZIP
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          $exe = "src-tauri/target/release/AeroFTP.exe"
          if (Test-Path $exe) {
            $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
            $zipName = "AeroFTP-${version}-portable-windows-x64.zip"
            Compress-Archive -Path $exe -DestinationPath "src-tauri/target/release/bundle/$zipName"
            Write-Host "Created portable ZIP: $zipName"
          } else {
            Write-Host "::error::AeroFTP.exe not found at $exe"
            exit 1
          }

      # On-demand artifact upload (NOT release builds). Lets us download
      # platform-native installers from the Actions run page without cutting
      # a public release. Tag-driven runs skip these steps because the
      # Sigstore-signed artifacts are already attached to the GitHub Release.
      - name: Upload Linux installers
        if: ${{ !startsWith(github.ref, 'refs/tags/') && matrix.target == 'linux' }}
        uses: actions/upload-artifact@v4
        with:
          name: aeroftp-linux-${{ github.sha }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Windows installers
        if: ${{ !startsWith(github.ref, 'refs/tags/') && matrix.target == 'windows' }}
        uses: actions/upload-artifact@v4
        with:
          name: aeroftp-windows-${{ github.sha }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/AeroFTP-*-portable-*.zip
          if-no-files-found: warn
          retention-days: 14

      - name: Upload macOS installers
        if: ${{ !startsWith(github.ref, 'refs/tags/') && matrix.target == 'macos' }}
        uses: actions/upload-artifact@v4
        with:
          name: aeroftp-macos-${{ github.sha }}
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn
          retention-days: 14

      # Sigstore keyless signing: supply chain transparency for all release artifacts.
      # Uses GitHub OIDC identity (zero secrets). Produces .sigstore.json verification bundles.
      - name: Install Cosign
        if: startsWith(github.ref, 'refs/tags/')
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign release artifacts with Sigstore
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          shopt -s nullglob
          ARTIFACTS=()

          case "${{ matrix.target }}" in
            linux)
              ARTIFACTS+=(src-tauri/target/release/bundle/deb/*.deb)
              ARTIFACTS+=(src-tauri/target/release/bundle/rpm/*.rpm)
              ARTIFACTS+=(src-tauri/target/release/bundle/appimage/*.AppImage)
              SNAP="${{ steps.snap-build.outputs.snap }}"
              [ -n "$SNAP" ] && [ -f "$SNAP" ] && ARTIFACTS+=("$SNAP")
              ;;
            windows)
              ARTIFACTS+=(src-tauri/target/release/bundle/msi/*.msi)
              ARTIFACTS+=(src-tauri/target/release/bundle/nsis/*.exe)
              ARTIFACTS+=(src-tauri/target/release/bundle/AeroFTP-*-portable-*.zip)
              ;;
            macos)
              ARTIFACTS+=(src-tauri/target/release/bundle/dmg/*-beta.dmg)
              ;;
          esac

          echo "Found ${#ARTIFACTS[@]} artifacts to sign"

          for artifact in "${ARTIFACTS[@]}"; do
            echo "Signing: $(basename "$artifact")"
            cosign sign-blob \
              --bundle "${artifact}.sigstore.json" \
              --new-bundle-format \
              --yes \
              "$artifact"
            echo "Signed: $(basename "$artifact").sigstore.json"
          done

      # Upload directly to GitHub Release (only on tags)
      # Each platform uploads its own binaries - no intermediate artifacts needed
      - name: Extract changelog for release
        if: startsWith(github.ref, 'refs/tags/') && matrix.target == 'linux'
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the section between this version header and the next version header
          NOTES=$(sed -n "/^## \[${VERSION}\]/,/^## \[/p" CHANGELOG.md | head -n -1)
          # Append download instructions
          NOTES="${NOTES}

          **Downloads:**
          - **Windows**: \`.msi\` installer, \`.exe\`, or \`.zip\` portable (no installation required)
          - **macOS**: \`.dmg\` disk image
          - **Linux**: \`.deb\`, \`.rpm\`, \`.snap\`, or \`.AppImage\`"
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload Linux binaries to Release
        if: startsWith(github.ref, 'refs/tags/') && matrix.target == 'linux'
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          name: 'AeroFTP ${{ github.ref_name }}'
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: false
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/deb/*.deb.sigstore.json
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/rpm/*.rpm.sigstore.json
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sigstore.json
            ${{ steps.snap-build.outputs.snap }}
            ${{ steps.snap-build.outputs.snap }}.sigstore.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Snap Store
        if: startsWith(github.ref, 'refs/tags/') && matrix.target == 'linux'
        continue-on-error: true
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        run: |
          SNAP_FILE="${{ steps.snap-build.outputs.snap }}"
          if [ -n "$SNAP_FILE" ] && [ -f "$SNAP_FILE" ]; then
            echo "Uploading $SNAP_FILE to Snap Store..."
            snapcraft upload --release=stable "$SNAP_FILE"
          else
            echo "Warning: Snap file not found, skipping Snap Store upload"
            echo "This is non-fatal - other packages will still be released"
          fi

      - name: Upload Windows binaries to Release
        if: startsWith(github.ref, 'refs/tags/') && matrix.target == 'windows'
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sigstore.json
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sigstore.json
            src-tauri/target/release/bundle/AeroFTP-*-portable-*.zip
            src-tauri/target/release/bundle/AeroFTP-*-portable-*.zip.sigstore.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename macOS DMG to beta
        if: matrix.target == 'macos'
        shell: bash
        run: |
          DMG_DIR="src-tauri/target/release/bundle/dmg"
          for f in "$DMG_DIR"/*.dmg; do
            [ -f "$f" ] || continue
            NEWNAME=$(echo "$f" | sed 's/\.dmg$/-beta.dmg/')
            mv "$f" "$NEWNAME"
            # Also rename sigstore bundle if present
            [ -f "${f}.sigstore.json" ] && mv "${f}.sigstore.json" "${NEWNAME}.sigstore.json"
            echo "Renamed: $(basename "$f") -> $(basename "$NEWNAME")"
          done

      - name: Upload macOS binaries to Release
        if: startsWith(github.ref, 'refs/tags/') && matrix.target == 'macos'
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          files: |
            src-tauri/target/release/bundle/dmg/*-beta.dmg
            src-tauri/target/release/bundle/dmg/*-beta.dmg.sigstore.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publish to Windows Package Manager (winget) on tag pushes
  publish-winget:
    needs: build-and-release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Publish to WinGet
        # A8-06: Pinned to SHA (v2 tag as of 2026-03-07)
        uses: vedantmgoyal9/winget-releaser@4ffc7888bffd451b357355dc214d43bb9f23917e # v2
        with:
          identifier: axpnet.AeroFTP
          installers-regex: '\.exe$|\.msi$'
          fork-user: axpnet
          token: ${{ secrets.WINGET_TOKEN }}
