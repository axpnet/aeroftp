# Dependabot configuration — automated dependency updates
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # Rust (Cargo) dependencies
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "rust"
    ignore:
      - dependency-name: "suppaftp"
        update-types: ["version-update:semver-patch", "version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "rand"
        update-types: ["version-update:semver-major"]
      - dependency-name: "zip"
        update-types: ["version-update:semver-major"]
      - dependency-name: "dirs"
        update-types: ["version-update:semver-major"]
      - dependency-name: "portable-pty"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "indicatif"
        update-types: ["version-update:semver-major"]
      - dependency-name: "notify-debouncer-full"
        update-types: ["version-update:semver-major"]
      - dependency-name: "windows"
        update-types: ["version-update:semver-patch", "version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "rusqlite"
        update-types: ["version-update:semver-major"]
      # ── RustCrypto digest 0.11 migration block ──────────────────────
      # sha1/sha2/md-5/ripemd 0.11+ require digest 0.11, but hmac 0.12
      # and hkdf 0.12 still depend on digest 0.10. Unblock when hmac 0.13
      # and hkdf 0.13 reach stable release.
      - dependency-name: "sha1"
        versions: [">=0.11.0"]
      - dependency-name: "sha2"
        versions: [">=0.11.0"]
      - dependency-name: "md-5"
        versions: [">=0.11.0"]
      - dependency-name: "ripemd"
        versions: [">=0.2.0"]
      # num-bigint-dig 0.9 requires rand 0.9, incompatible with rsa 0.9
      # which depends on num-bigint-dig 0.8. Unblock when rsa 0.10 stable.
      - dependency-name: "num-bigint-dig"
        versions: [">=0.9.0"]

  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "javascript"
    ignore:
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitejs/plugin-react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@xterm/xterm"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    ignore:
      - dependency-name: "actions/checkout"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/setup-node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "softprops/action-gh-release"
        update-types: ["version-update:semver-major"]
